<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exit-Ticket – KSS COLLECT &amp; CONNECT</title>
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/style.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="d-flex justify-content-between align-items-start">
      <h1 class="mb-1">Exit-Ticket</h1>
      <button class="btn btn-outline-secondary btn-sm" data-toggle="modal" data-target="#helpModal">❓ Hilfe</button>
    </div>
    <p class="text-center text-muted mb-3">Kurzer Rückblick auf die heutige Stunde.</p>

    <div id="teacherBanner" style="display:none;"></div>

    <form id="exitForm">
      <div class="form-group">
        <label for="klasse" class="required-label">Klasse</label>
        <select class="form-control" id="klasse" required>
          <option value="">-- Klasse wählen --</option>
          <optgroup label="FMS"><option>1FMS</option><option>2FMS</option><option>3FMS</option></optgroup>
          <optgroup label="GYM-G"><option>1GYM-G</option><option>2GYM-G</option><option>3GYM-G</option><option>4GYM-G</option></optgroup>
          <optgroup label="WMS/IMS"><option>1WMS/IMS</option><option>2WMS/IMS</option><option>3WMS/IMS</option></optgroup>
          <optgroup label="Sonstige"><option>LatInt</option><option>efG</option><option>ffGR</option><option>EXTRA</option></optgroup>
        </select>
      </div>

      <div class="form-group">
        <label for="nickname">Nickname <span class="text-muted">(optional)</span></label>
        <input type="text" class="form-control" id="nickname" placeholder="freiwillig">
      </div>

      <div class="form-section">
        <div class="form-group">
          <label for="erkenntnis" class="required-label">1. Was war die wichtigste Erkenntnis der heutigen Stunde?</label>
          <textarea class="form-control" id="erkenntnis" rows="2" required></textarea>
        </div>

        <div class="form-group">
          <label for="frage">2. Hast du zu einem Thema/Bereich noch eine Frage?</label>
          <textarea class="form-control" id="frage" rows="2" placeholder="Falls ja, hier eintragen"></textarea>
        </div>

        <div class="form-group">
          <label class="required-label d-block">3. Wie sicher fühlst du dich beim aktuellen Thema?</label>
          <div class="scale-options">
            <input type="radio" name="sicherheit" id="s1" value="1"><label for="s1"><span class="scale-num">1</span>sehr unsicher</label>
            <input type="radio" name="sicherheit" id="s2" value="2"><label for="s2"><span class="scale-num">2</span>eher unsicher</label>
            <input type="radio" name="sicherheit" id="s3" value="3"><label for="s3"><span class="scale-num">3</span>mittel</label>
            <input type="radio" name="sicherheit" id="s4" value="4"><label for="s4"><span class="scale-num">4</span>ziemlich sicher</label>
            <input type="radio" name="sicherheit" id="s5" value="5"><label for="s5"><span class="scale-num">5</span>sehr sicher</label>
          </div>
        </div>

        <div class="form-group mb-0">
          <label for="hilfe">4. Was würde dir helfen, das Thema noch besser zu verstehen? <span class="text-muted">(optional)</span></label>
          <textarea class="form-control" id="hilfe" rows="2"></textarea>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Absenden</button>
    </form>
  </div>

  <a href="index.html" class="btn admin-button">← Zurück</a>
  <footer>© 2025 Daniel Rutz. Alle Rechte vorbehalten.</footer>

  <div class="modal fade" id="helpModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Hilfe</h5>
      <button type="button" class="close" data-dismiss="modal">&times;</button></div>
    <div class="modal-body" style="font-size:14px;">
      <ul class="pl-3 mb-0">
        <li>Oben steht, für wen dein Exit-Ticket ist.</li>
        <li>Pflicht sind: Klasse, Frage 1 (Erkenntnis) und Frage 3 (Sicherheit 1–5).</li>
        <li>Die Fragen 2 und 4 sind freiwillig. Dann „Absenden".</li>
      </ul>
    </div>
  </div></div></div>

  <script src="assets/common.js"></script>
  <script>
    $('#exitForm').on('submit', function(e) {
      e.preventDefault();
      const klasse = $('#klasse').val();
      const erkenntnis = $('#erkenntnis').val().trim();
      const sicherheit = $('input[name="sicherheit"]:checked').val();
      if (!klasse || !erkenntnis || !sicherheit) {
        alert('Bitte Klasse, Erkenntnis (Frage 1) und Sicherheit (Frage 3) ausfüllen.');
        return;
      }

      const btn = $(this).find('button[type="submit"]');
      btn.prop('disabled', true).text('Wird gesendet...');

      $.post('submit.php', {
        code: window.TEACHER_CODE,
        form_type: 'exit_ticket',
        klasse: klasse,
        nickname: $('#nickname').val().trim(),
        erkenntnis: erkenntnis,
        frage: $('#frage').val().trim(),
        sicherheit: sicherheit,
        hilfe: $('#hilfe').val().trim()
      }, null, 'json')
      .done(function(resp) {
        if (resp.success) {
          alert('Danke! Dein Exit-Ticket wurde gespeichert.');
          $('#exitForm')[0].reset();
        } else {
          alert('Fehler: ' + (resp.message || 'Unbekannter Fehler'));
        }
      })
      .fail(function() { alert('Verbindung zum Server fehlgeschlagen. Bitte erneut versuchen.'); })
      .always(function() { btn.prop('disabled', false).text('Absenden'); });
    });
  </script>
</body>
</html>
